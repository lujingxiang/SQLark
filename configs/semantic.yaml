fields:
  Volume: ["成交量", "成交波动量", "量能", "手数"]
  Turnover: ["成交额", "成交金额", "金额"]
  ChangePercent: ["涨跌幅", "涨幅", "跌幅", "变化幅度"]
  ChangeAmount: ["涨跌额", "变化额", "涨跌金额"]
  HighPrice: ["最高价", "最高"]
  LowPrice: ["最低价", "最低"]
  OpenPrice: ["开盘价", "今开", "开盘"]
  PrevClose: ["昨收", "昨收价"]
  LatestPrice: ["价格", "股价", "最新价", "现价", "收盘价"]

analysis_types:
  count: ["多少条", "总数", "数量", "几条"]
  volatility: ["波动", "标准差", "波动率", "稳定性"]
  trend: ["趋势", "走势", "变化"]
  anomaly: ["异常", "异常点", "异常值", "极端值"]
  comparison: ["对比", "比较", "差异", "前后", "环比"]
  basic: ["平均", "均值", "最高", "最低", "中位数"]

out_of_domain_words:
  - 订单
  - 用户
  - 商品
  - 仓库
  - 支付

defaults:
  intent: query
  field: LatestPrice
  analysis_type: basic
  limit: 20
  max_limit: 500

data_sources:
  sqlite_default:
    description: "默认本地 SQLite 数据源，包含 StockData 和 StockData_15min 表。"
  MarketQuote:
    description: "模拟外部行情数据源，用于行情和因子查询。"
  NewsSentiment:
    description: "模拟外部新闻舆情数据源，用于金融新闻摘要和情绪分析。"
