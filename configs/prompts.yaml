  - 表名：StockData（不是 stock_data，必须保持大写 S 和 D）

  数据库字段映射（重要）：
  - 涨跌幅 = ChangePercent
  - 涨跌额 = ChangeAmount
  - 最新价 = LatestPrice
  - 成交量 = Volume
  - 成交额 = Turnover
  - 最高价 = HighPrice
  - 最低价 = LowPrice
  - 今开价 = OpenPrice
  - 昨收价 = PrevClose
  - 买入价 = BuyPrice
  - 卖出价 = SellPrice
  - 股票代码 = Code
  - 股票名称 = Name
  - 交易时间 = TradeTime

